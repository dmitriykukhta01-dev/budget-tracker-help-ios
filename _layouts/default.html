<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="index, follow" />
  <title>{{ page.title }} — {{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}" />
  <style>
    :root {
      --bg: #f7f8f7;
      --surface: #ffffff;
      --text: #1c2321;
      --muted: #5b6663;
      --border: #e3e7e5;
      --accent: #1f8a70;
      --accent-soft: #e7f4ef;
      --code-bg: #eef1f0;
      --max: 760px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f1513;
        --surface: #161d1b;
        --text: #e8ecea;
        --muted: #9aa5a2;
        --border: #263230;
        --accent: #4bbf9c;
        --accent-soft: #17302a;
        --code-bg: #1e2624;
      }
    }
    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.65;
      font-size: 17px;
    }
    .wrap { max-width: var(--max); margin: 0 auto; padding: 0 20px 40px; }

    header.site { background: var(--surface); border-bottom: 1px solid var(--border); padding: 28px 20px; }
    header.site .inner { max-width: var(--max); margin: 0 auto; display: flex; align-items: center; gap: 14px; }
    .badge {
      width: 44px; height: 44px; border-radius: 12px; flex: none;
      background: var(--accent); color: #fff; display: grid; place-items: center;
      font-weight: 700; font-size: 20px; letter-spacing: -0.5px;
    }
    .brand-title { font-size: 19px; font-weight: 700; line-height: 1.2; }
    .brand-sub { color: var(--muted); font-size: 14px; margin-top: 2px; }

    /* Markdown content */
    .wrap h1 { font-size: 30px; letter-spacing: -0.6px; margin: 40px 0 6px; }
    .wrap h2 { font-size: 21px; letter-spacing: -0.3px; margin: 40px 0 12px; padding-top: 8px; }
    .wrap h3 { font-size: 17px; margin: 24px 0 8px; }
    .wrap p, .wrap li { color: var(--text); }
    .wrap a { color: var(--accent); text-decoration: none; }
    .wrap a:hover { text-decoration: underline; }
    .wrap ul, .wrap ol { padding-left: 22px; }
    .wrap li { margin: 6px 0; }
    .lead { color: var(--muted); font-size: 17px; }
    .updated { color: var(--muted); font-size: 14.5px; margin-top: 0; }

    /* Blockquote → callout */
    .wrap blockquote {
      background: var(--accent-soft);
      border: 1px solid var(--border);
      border-left: 4px solid var(--accent);
      border-radius: 10px;
      padding: 4px 18px;
      margin: 24px 0;
      color: var(--text);
    }

    /* Tables */
    .wrap table {
      width: 100%; border-collapse: collapse; margin: 18px 0; font-size: 15.5px;
      display: block; overflow-x: auto;
    }
    @media (min-width: 620px) { .wrap table { display: table; } }
    .wrap th, .wrap td { text-align: left; padding: 11px 12px; border-bottom: 1px solid var(--border); vertical-align: top; }
    .wrap th { color: var(--muted); font-weight: 600; font-size: 13.5px; text-transform: uppercase; letter-spacing: 0.4px; }

    code { background: var(--code-bg); padding: 1px 6px; border-radius: 5px; font-size: 14px; }

    /* Auto-generated table of contents */
    .toc-heading { text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); font-size: 13px; font-weight: 700; margin: 28px 0 0; }
    #markdown-toc {
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
      padding: 16px 22px; margin: 10px 0 28px; list-style: none; columns: 2; column-gap: 28px;
    }
    #markdown-toc li { margin: 5px 0; }
    #markdown-toc a { color: var(--text); }
    @media (max-width: 520px) { #markdown-toc { columns: 1; } }

    /* FAQ accordions */
    details { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 2px 18px; margin: 10px 0; }
    details summary { cursor: pointer; padding: 15px 0; font-weight: 600; font-size: 16.5px; list-style: none; display: flex; justify-content: space-between; align-items: center; gap: 12px; }
    details summary::-webkit-details-marker { display: none; }
    details summary::after { content: "+"; color: var(--accent); font-size: 22px; font-weight: 400; line-height: 1; }
    details[open] summary::after { content: "\2013"; }
    details .body { padding: 0 0 16px; }
    details .body p { margin: 0 0 10px; }
    details .body p:last-child { margin-bottom: 0; }

    hr { border: none; border-top: 1px solid var(--border); margin: 44px 0; }

    footer.site { max-width: var(--max); margin: 0 auto; padding: 28px 20px 80px; color: var(--muted); font-size: 14px; border-top: 1px solid var(--border); }
    footer.site a { color: var(--accent); text-decoration: none; }
    footer.site .links { margin-bottom: 10px; }
  </style>
</head>
<body>
  <header class="site">
    <div class="inner">
      <div class="badge">FB</div>
      <div>
        <div class="brand-title">{{ site.title }}</div>
        <div class="brand-sub">{{ page.subtitle | default: page.title }}</div>
      </div>
    </div>
  </header>

  <main class="wrap">
    {{ content }}
  </main>

  <footer class="site">
    <div class="links">
      <a href="privacy.html">Privacy Policy</a> &nbsp;·&nbsp;
      <a href="support.html">Support &amp; Help</a>
    </div>
    © 2026 Dmitriy Kukhta · Family Budget Tracker. All rights reserved.
  </footer>
</body>
</html>
